[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# Opciones de output
addopts = [
    "-v",                          # Verbose
    "--strict-markers",            # Markers estrictos
    "--tb=short",                  # Traceback corto
    "--disable-warnings",          # Desactivar warnings
    "-ra",                         # Mostrar resumen de todos los tests
]

# Markers personalizados
markers = [
    "unit: Tests unitarios",
    "integration: Tests de integración",
    "api: Tests de API endpoints",
    "slow: Tests lentos",
    "db: Tests que requieren base de datos",
]

# Coverage
[tool.coverage.run]
source = ["app", "extractor_services"]
omit = [
    "*/tests/*",
    "*/test_*.py",
    "*/__pycache__/*",
    "*/venv/*",
    "*/.venv/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]

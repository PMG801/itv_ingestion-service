version: '3.8'

# Servicios de infraestructura base (RabbitMQ, PostgreSQL)
# Levantar con: docker-compose -f infra/docker-compose.infrastructure.yml up -d

services:
  # RabbitMQ - Message Broker
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: itv_rabbitmq
    hostname: rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"         # AMQP
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-admin123}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-itv_data}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    networks:
      - itv_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # PostgreSQL with PostGIS
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: itv_postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-itv_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-itv_pass123}
      POSTGRES_DB: ${POSTGRES_DB:-itv_database}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - itv_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-itv_user} -d ${POSTGRES_DB:-itv_database}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Optimización para desarrollo (4GB RAM total)
    command:
      - "postgres"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "work_mem=16MB"

volumes:
  rabbitmq_data:
    driver: local
  postgres_data:
    driver: local

networks:
  itv_network:
    driver: bridge
    name: itv_network

# Alembic Configuration File
# 
# Este archivo configura Alembic para gestionar migraciones de base de datos.
# Las migraciones se almacenan en el directorio alembic/ y la tabla de versiones
# en el schema 'itv'.

[alembic]
# Path al directorio de migraciones (relativo a este archivo)
script_location = alembic

# Template usado para generar migraciones
# Usa el formato estándar con timestamp en el nombre del archivo
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone para timestamps en nombres de archivo
# timezone =

# Máximo número de revisiones a mostrar en comandos de log
# truncate_slug_length = 40

# Schema donde se almacena la tabla alembic_version
# IMPORTANTE: Debe coincidir con el schema de tus tablas
version_table_schema = itv

# Nombre de la tabla de versiones (default: alembic_version)
# version_table = alembic_version

# URL de conexión a la base de datos
# NOTA: Se configura dinámicamente desde env.py usando settings.SQLALCHEMY_DATABASE_URI
# Para testing manual, puedes descomentar y ajustar:
# sqlalchemy.url = postgresql+asyncpg://itv_user:itv_pass123@localhost:5432/itv_database

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

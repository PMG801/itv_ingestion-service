x-env-file: &env-file
  env_file:
    - ./.env

services:
  # ============ INFRASTRUCTURE ============
  
  rabbitmq:
    <<: *env-file
    image: rabbitmq:3.12-management-alpine
    container_name: itv_rabbitmq
    hostname: rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-admin123}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-itv_data}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      # - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      # - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    networks:
      - itv_network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1GB
        reservations:
          cpus: "0.25"
          memory: 256MB
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    <<: *env-file
    image: postgis/postgis:15-3.4-alpine
    container_name: itv_postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - itv_network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1GB
        reservations:
          cpus: "0.25"
          memory: 256MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-itv_user} -d ${POSTGRES_DB:-itv_database}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command:
      - "postgres"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "work_mem=16MB"

  # ============ APPLICATIONS ============
  
  gateway:
    <<: *env-file
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    container_name: itv_gateway
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    environment:
      APP_NAME: "ITV Gateway Service"
    volumes:
      - ./apps/gateway:/app/apps/gateway
      - ./core:/app/core
      - ./domain:/app/domain
    networks:
      - itv_network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256MB
        reservations:
          cpus: "0.1"
          memory: 128MB
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  normalizer:
    <<: *env-file
    build:
      context: .
      dockerfile: apps/normalizer/Dockerfile
    environment:
      APP_NAME: "ITV Normalizer Worker"
      INPUT_QUEUE: raw_data.itv_stations
      OUTPUT_EXCHANGE: normalized_data
    volumes:
      - ./apps/normalizer:/app/apps/normalizer
      - ./core:/app/core
      - ./domain:/app/domain
    networks:
      - itv_network
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512MB
        reservations:
          cpus: "0.5"
          memory: 256MB
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  persister:
    <<: *env-file
    build:
      context: .
      dockerfile: apps/persister/Dockerfile
    environment:
      APP_NAME: "ITV Persister Worker"
      INPUT_QUEUE: normalized_data.itv_stations
    volumes:
      - ./apps/persister:/app/apps/persister
      - ./core:/app/core
      - ./domain:/app/domain
    networks:
      - itv_network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128MB
        reservations:
          cpus: "0.1"
          memory: 64MB
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  rabbitmq_data:
    driver: local
  postgres_data:
    driver: local

networks:
  itv_network:
    driver: bridge
    name: itv_network
